<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DigiSolutions | Department Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0f1e;
    --ink2: #1a2340;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --gold: #f5a623;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --text: #e8eaf6;
    --muted: rgba(232,234,246,0.45);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--ink);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(79,110,247,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(124,58,237,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(245,166,35,0.04) 0%, transparent 70%),
      #0a0f1e;
  }

  .grid-lines {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 400px; height: 400px; background: rgba(79,110,247,0.12); top: -100px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 300px; height: 300px; background: rgba(124,58,237,0.1); bottom: -80px; right: -80px; animation-delay: -4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  .card {
    position: relative; z-index: 10;
    width: 100%; max-width: 440px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    backdrop-filter: blur(24px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: slideUp 0.7s cubic-bezier(.22,1,.36,1) both;
    margin: 24px;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-wrap {
    display: flex; align-items: center; gap: 12px; margin-bottom: 36px;
  }

  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(79,110,247,0.35);
  }

  .logo-icon svg { width: 22px; height: 22px; fill: white; }

  .logo-text { font-family: 'Syne', sans-serif; }
  .logo-text .brand { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
  .logo-text .sub { font-size: 11px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; font-weight: 400; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .card-sub {
    font-size: 14px; color: var(--muted);
    margin-bottom: 36px;
    font-weight: 300;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.25);
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 13px 14px 13px 42px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.25s;
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  input:focus {
    border-color: var(--accent);
    background: rgba(79,110,247,0.07);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.15);
  }

  .forgot {
    text-align: right; margin-top: 6px;
    font-size: 12px; color: var(--accent);
    text-decoration: none; opacity: 0.8;
    transition: opacity 0.2s;
  }
  .forgot:hover { opacity: 1; }

  .btn-login {
    width: 100%;
    padding: 14px;
    margin-top: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 8px 24px rgba(79,110,247,0.35);
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .btn-login::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 32px rgba(79,110,247,0.45);
  }
  .btn-login:hover::after { opacity: 1; }
  .btn-login:active { transform: translateY(0); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 28px 0 22px;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider p { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .security-note {
    display: flex; align-items: center; gap: 8px;
    background: rgba(79,110,247,0.07);
    border: 1px solid rgba(79,110,247,0.15);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px; color: var(--muted);
  }
  .security-note svg { color: var(--accent); flex-shrink: 0; }

  .error-msg {
    display: none;
    color: #ff6b6b; font-size: 12px; margin-top: 6px;
    padding: 8px 12px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 8px;
  }

  .portal-switch {
    display: block;
    text-align: center;
    margin-top: 22px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .portal-switch:hover { color: var(--text); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid-lines"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-text">
      <div class="brand">DigiSolutions</div>
      <div class="sub">Department Portal</div>
    </div>
  </div>

  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to access your department dashboard</div>

  <div class="field">
    <label>Email Address</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
      <input type="email" id="email" placeholder="dept@digisolutions.com">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <a href="#" class="forgot">Forgot password?</a>
  </div>

  <div class="error-msg" id="errMsg">⚠ Invalid credentials. Please try again.</div>

  <button class="btn-login" onclick="login()">Sign In to Dashboard →</button>

  <div class="divider"><span></span><p>Secure access</p><span></span></div>

  <div class="security-note">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    This portal is for authorized department personnel only. All activity is monitored.
  </div>

  <a href="admin-login.html" class="portal-switch">Admin Portal? → admin-login.html</a>
</div>

<script>
function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const err = document.getElementById('errMsg');

  if (!email || !password) {
    err.style.display = 'block';
    err.textContent = '⚠ Please enter your email and password.';
    return;
  }
  err.style.display = 'none';
  document.querySelector('.btn-login').textContent = 'Signing in…';
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
}

document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
});
</script>
</body>
</html>
